<!DOCTYPE html>
<html>
<head>
  <title>NutriGen AI — Access Required</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1a472a, #2ecc71);
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 340px;
    }
    h2 { color: #1a472a; font-size: 28px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 20px; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button:hover { background: #27ae60; }
    .error { color: red; font-size: 13px; margin-top: 10px; }
    .logo { font-size: 40px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">🥗</div>
    <h2>NutriGen AI</h2>
    <p>Investor & Team Preview<br>Enter your access code to continue</p>
    <input type="password" id="pwd" placeholder="Access code" />
    <button onclick="checkPassword()">Access Preview</button>
    <p class="error" id="error"></p>
  </div>
  <script>
    function checkPassword() {
      const pwd = document.getElementById('pwd').value;
      if (pwd === 'NutriGen2026') {
        sessionStorage.setItem('nutrigen_auth', 'granted');
        window.location.href = '/index.html';
      } else {
        document.getElementById('error').textContent = 'Incorrect access code. Please try again.';
      }
    }
    document.getElementById('pwd').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
